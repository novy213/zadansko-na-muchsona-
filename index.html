<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=prompt("1. dodawanie, 2.odejmowanie, 3.mnozenie, 4.dzielenie");
        let b=parseInt(prompt("Podaj a"));
        let c=parseInt(prompt("Podaj b"));
        switch(a){
            case '1':
                document.write(b+c);
            break;
            case '2':
                document.write(b-c);
            break;
            case '3':
                document.write(b*c);
            break;
            case '4':
                document.write(b/c);
            break;
        }
    </script>
</body>
</html>
